name: Build Release APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore from Secret
        run: |
          mkdir -p signature
          echo "${{ secrets.SIGNATURE_JSON }}" | base64 --decode > signature/release.keystore

      - name: Write google-services.json from Secret
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Extract version name
        if: github.event_name == 'push'
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Get short SHA
        if: github.event_name == 'push'
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.version.outputs.name }}-${{ steps.sha.outputs.short }}"
          name: "v${{ steps.version.outputs.name }}-${{ steps.sha.outputs.short }}"
          files: app/build/outputs/apk/release/*.apk
          make_latest: true
